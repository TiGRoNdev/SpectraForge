name: "CodeQL"

on:
  push:
    branches: [ master, release/*, refactoring/* ]
  pull_request:
    branches: [ master, release/* ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libvulkan-dev \
          vulkan-headers \
          vulkan-validationlayers \
          spirv-tools

    - name: Configure CMake (CodeQL-compatible)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_COMPILER=g++ \
          -DCMAKE_C_COMPILER=gcc \
          -DBUILD_EXAMPLES=OFF \
          -DBUILD_TESTS=OFF \
          -DBUILD_WITH_CUDA=OFF \
          -DBUILD_WITH_OPTIX=OFF \
          -DBUILD_WITH_DLSS=OFF \
          -DBUILD_WITH_FSR=OFF \
          -DBUILD_VULKAN_RENDERER=ON \
          -DENABLE_VULKAN_BACKEND=ON

    - name: Build
      run: cmake --build build --config Debug --parallel $(nproc)

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
