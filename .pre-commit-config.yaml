# Pre-commit hooks для HyperEngine
repos:
  # Базовые проверки
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Форматирование C++ с автоматическим исправлением
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v16.0.6
    hooks:
      - id: clang-format
        args: [--style=file, -i]  # -i для автоматического исправления
        files: \.(cpp|h|hpp|c|cc|cxx)$
        description: "Автоматическое форматирование C++ кода"

  # CMake форматирование
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        additional_dependencies: [pyyaml]
        types: [cmake]

  # Проверка орфографии в комментариях
  - repo: https://github.com/codespell-project/codespell
    rev: v2.2.5
    hooks:
      - id: codespell
        args: [--write-changes]
        exclude: |
          (?x)^(
              .*\.json|
              .*\.xml|
              .*\.log|
              build/.*|
              vcpkg/.*|
              vcpkg_installed/.*
          )$

  # Локальные хуки для специфических проверок SpectraForge
  - repo: local
    hooks:
      # SOLID Compliance Audit
      - id: solid-audit
        name: SOLID Compliance Check
        entry: scripts/solid_audit.sh
        language: script
        files: \.(cpp|h|hpp)$
        pass_filenames: false
        stages: [commit]

      # SAFE_TO_STRING Check
      - id: safe-to-string-check
        name: SAFE_TO_STRING Compliance
        entry: scripts/check_safe_to_string.sh
        language: script
        files: \.(cpp|c|cc|cxx)$
        pass_filenames: false
        stages: [commit]

      # Быстрая проверка безопасности
      - id: security-check-quick
        name: Quick security check
        entry: bash
        args: [-c, 'grep -n "strcpy\|strcat\|sprintf\|gets" $@ || true']
        language: system
        files: \.(cpp|h|hpp|c|cc|cxx)$
        verbose: true

      # Проверка на TODO/FIXME без issue номеров
      - id: check-todos
        name: Check TODO/FIXME comments
        entry: bash
        args: [-c, 'if grep -n "TODO\|FIXME" $@ | grep -v "#[0-9]"; then echo "TODO/FIXME должны содержать номер issue"; exit 1; fi']
        language: system
        files: \.(cpp|h|hpp|c|cc|cxx)$

      # God Class Detection (SRP)
      - id: god-class-check
        name: God Class Detection (>500 lines)
        entry: bash
        args: [-c, 'for file in "$@"; do lines=$(wc -l < "$file"); if [ "$lines" -gt 500 ]; then echo "❌ SRP VIOLATION: $file has $lines lines (limit: 500)"; exit 1; fi; done']
        language: system
        files: \.(cpp|h|hpp)$

      # Raw pointer check (RAII/DIP)
      - id: raw-pointer-check
        name: Raw Pointer Check (use smart pointers)
        entry: bash
        args: [-c, 'if grep -n "new \|delete " "$@" | grep -v "//"; then echo "❌ Use std::make_unique/make_shared instead of raw new/delete"; exit 1; fi']
        language: system
        files: \.(cpp|c|cc|cxx)$

      # Using namespace std in headers
      - id: no-using-namespace-std
        name: No "using namespace std" in headers
        entry: bash
        args: [-c, 'if grep -n "using namespace std" "$@"; then echo "❌ NEVER use using namespace std in headers!"; exit 1; fi']
        language: system
        files: \.(h|hpp)$

      # Pragma once check
      - id: pragma-once-check
        name: Ensure #pragma once in headers
        entry: bash
        args: [-c, 'for file in "$@"; do if ! grep -q "#pragma once" "$file"; then echo "❌ Missing #pragma once in $file"; exit 1; fi; done']
        language: system
        files: \.(h|hpp)$

# Конфигурация
default_stages: [commit]
fail_fast: false
minimum_pre_commit_version: 3.0.0