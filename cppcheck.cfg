# Конфигурация cppcheck для HyperEngine

# Глобальные настройки
<?xml version="1.0"?>
<def>
    <!-- Подавляемые предупреждения -->
    <suppress>
        <id>missingIncludeSystem</id>
    </suppress>
    <suppress>
        <id>unusedFunction</id>
        <fileName>tests/*</fileName>
    </suppress>
    <suppress>
        <id>unusedFunction</id>
        <fileName>examples/*</fileName>
    </suppress>
    <suppress>
        <id>cstyleCast</id>
        <fileName>*cuda*</fileName>
    </suppress>
    <suppress>
        <id>variableScope</id>
        <fileName>*cuda*</fileName>
    </suppress>
    
    <!-- Подавление для внешних библиотек -->
    <suppress>
        <id>*</id>
        <fileName>vcpkg/*</fileName>
    </suppress>
    <suppress>
        <id>*</id>
        <fileName>build*/*</fileName>
    </suppress>
    
    <!-- Пользовательские макросы -->
    <define name="HYPERENGINE_API" value=""/>
    <define name="HYPERENGINE_EXPORT" value=""/>
    <define name="HYPERENGINE_INLINE" value="inline"/>
    <define name="FORCE_INLINE" value="__forceinline"/>
    
    <!-- CUDA макросы -->
    <define name="__global__" value=""/>
    <define name="__device__" value=""/>
    <define name="__host__" value=""/>
    <define name="__constant__" value=""/>
    <define name="__shared__" value=""/>
    
    <!-- Vulkan макросы -->
    <define name="VK_API_VERSION_1_0" value="VK_MAKE_VERSION(1, 0, 0)"/>
    <define name="VK_API_VERSION_1_1" value="VK_MAKE_VERSION(1, 1, 0)"/>
    <define name="VK_API_VERSION_1_2" value="VK_MAKE_VERSION(1, 2, 0)"/>
    <define name="VK_API_VERSION_1_3" value="VK_MAKE_VERSION(1, 3, 0)"/>
    
    <!-- Platform-specific макросы -->
    <define name="_WIN32" value="1"/>
    <define name="_WIN64" value="1"/>
    <define name="WIN32_LEAN_AND_MEAN" value=""/>
    <define name="NOMINMAX" value=""/>
    
    <!-- Compiler-specific макросы -->
    <define name="_MSC_VER" value="1930"/>
    <define name="__cplusplus" value="202002L"/>
    
    <!-- Пользовательские функции для анализа -->
    <function name="SAFE_TO_STRING">
        <arg nr="1"/>
        <returnValue type="std::string"/>
        <noreturn>false</noreturn>
    </function>
    
    <function name="SAFE_DELETE">
        <arg nr="1"/>
        <returnValue type="void"/>
        <noreturn>false</noreturn>
    </function>
    
    <function name="SAFE_DELETE_ARRAY">
        <arg nr="1"/>
        <returnValue type="void"/>
        <noreturn>false</noreturn>
    </function>
    
    <!-- Библиотеки -->
    <library>
        <function name="glGetError">
            <returnValue type="GLenum"/>
            <noreturn>false</noreturn>
        </function>
        
        <function name="vkCreateInstance">
            <arg nr="1"/>
            <arg nr="2"/>
            <arg nr="3"/>
            <returnValue type="VkResult"/>
            <noreturn>false</noreturn>
        </function>
    </library>
</def>
