version: '3.8'

services:
  # CI/CD runner service - for running quality checks and tests
  ci-runner:
    build:
      context: .
      target: ci-runner
      args:
        CPPCHECK_VERSION: "2.12"
    image: hyperengine-ci:latest
    container_name: hyperengine-ci
    volumes:
      - .:/workspace
      - ccache:/ccache
      - vcpkg-cache:/opt/vcpkg/downloads
    working_dir: /workspace
    environment:
      - CCACHE_DIR=/ccache
      - CMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake
    command: /bin/bash
    tty: true
    stdin_open: true

  # Builder service - for compilation and building
  builder:
    build:
      context: .
      target: builder
    image: hyperengine-builder:latest
    container_name: hyperengine-builder
    volumes:
      - .:/workspace
      - build-output:/workspace/build
      - ccache:/ccache
    working_dir: /workspace
    environment:
      - CCACHE_DIR=/ccache

  # Development environment - for interactive development
  dev:
    build:
      context: .
      target: development
    image: hyperengine-dev:latest
    container_name: hyperengine-dev
    volumes:
      - .:/workspace
      - ccache:/ccache
      - vcpkg-cache:/opt/vcpkg/downloads
    working_dir: /workspace
    environment:
      - CCACHE_DIR=/ccache
      - CMAKE_TOOLCHAIN_FILE=/opt/vcpkg/scripts/buildsystems/vcpkg.cmake
    command: /bin/bash
    tty: true
    stdin_open: true

  # Demo service - for running demos with GUI
  demo:
    build:
      context: .
      target: builder
    image: hyperengine-demo:latest
    container_name: hyperengine-demo
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - .:/workspace
    network_mode: host
    working_dir: /workspace/build
    command: ["./HyperEngine_Demo"]

volumes:
  ccache:
    driver: local
  vcpkg-cache:
    driver: local
  build-output:
    driver: local
